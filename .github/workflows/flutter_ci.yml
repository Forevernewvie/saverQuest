name: Flutter CI

on:
  push:
    branches:
      - main
      - codex/develop
      - codex/feature/**
      - codex/release/**
      - codex/hotfix/**
  pull_request:
    branches:
      - main
      - codex/develop

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Android debug APK
        run: flutter build apk --debug
